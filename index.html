<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>PsiConHombres</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clinical: {
                            cream: '#F2ECE7',
                            slate: '#1A181C',
                            lavender: '#C5AED3',
                            sage: '#98B0A5',
                            taupe: '#4A464C',
                            border: '#C2B9B5',
                            selected: '#D5DFDA'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #F2ECE7;
        }

        body {
            position: relative;
            color: #1A181C;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* FONDO REAL */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            z-index: 0;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #C2B9B5;
            border-radius: 4px;
        }

        .slide-container {
            opacity: 1;
            transform: translateY(0);
            transition: opacity .3s ease-in-out, transform .4s ease-out;
        }

        .slide-exit {
            opacity: 0;
            transform: translateY(-5px);
            pointer-events: none;
        }

        .slide-enter {
            opacity: 0;
            transform: translateY(10px);
        }

        .option-card {
            transition: all .2s ease;
            position: relative;
            background-color: rgba(255,255,255,.18);
            border: 1px solid #C2B9B5;
            backdrop-filter: blur(4px);
        }

        .option-card:hover {
            background-color: rgba(197,174,211,.15);
            border-color: #C5AED3;
        }

        .option-card.selected {
            background-color: #D5DFDA;
            border-color: #98B0A5;
            color: #1A181C;
            font-weight: 500;
        }

        .intimate-textarea {
            background: transparent;
            border: none;
            border-bottom: 1px solid #C2B9B5;
            resize: none;
            transition: border-color .2s ease;
            line-height: 1.6;
            color: #1A181C;
            overflow: hidden;
        }

        .intimate-textarea:focus {
            outline: none;
            border-bottom-color: #98B0A5;
        }

        .intimate-textarea::placeholder {
            color: #716C73;
            font-style: italic;
        }

        .btn-fade {
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s ease;
        }

        .btn-fade.visible {
            opacity: 1;
            pointer-events: auto;
        }
    </style>

</head>

<body class="w-full flex flex-col relative min-h-screen">

   <picture id="bg-wrapper">
    <source
        media="(max-width: 768px) and (orientation: portrait)"
        srcset="fondo-mobile.png"
    >
    <img
        src="fondo.png"
        alt=""
        id="bg-image"
    >
</picture>

    <div id="progress-container"
         class="fixed top-0 left-0 w-full h-[3px] bg-transparent z-50 opacity-0 transition-opacity duration-500">
        <div id="progress-bar"
             class="h-full bg-clinical-sage w-0 transition-all duration-500 ease-in-out">
        </div>
    </div>

    <main id="app-container"
          class="flex-1 w-full flex flex-col items-center justify-center pt-8 md:pt-12 pb-8 px-6 md:px-12 max-w-5xl mx-auto relative z-10 min-h-[90vh]">
    </main>

<script>

const getSeparatorHtml = () => `
    <div class="flex items-center justify-center space-x-3 my-5 md:my-8 opacity-70">
        <div class="h-[1px] w-12 bg-clinical-taupe/40"></div>
        <svg class="w-3.5 h-3.5 text-clinical-taupe" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.5v15m7.5-7.5h-15"></path>
        </svg>
        <div class="h-[1px] w-12 bg-clinical-taupe/40"></div>
    </div>
`;

const experienceFlow = [
{
    type:'intro',
    title:'PsiConHombres',
    content:[
        '¡Hola! Bienvenido a este espacio.',
        'Antes de empezar, te invito hacer una pequeña pausa.',
        'Si te parece bien, tomate un momento para registrar cómo estás acá y ahora. Hacé 5 respiraciones profundas: inhalá en 4 segundos, retené el aire 4 segundos y exhalá lentamente en 6 segundos.',
        'Notá el aire, soltá un poco el piloto automático del día y disponete a conectar con vos mismo desde la tranquilidad.',
        'El objetivo del formulario es comprender cómo las exigencias, mandatos y expectativas del sistema (lo que históricamente se les enseñó sobre <strong class="font-bold text-clinical-slate">"ser un verdadero varón"</strong>) impactan en tu salud psicológica, tus emociones y la forma en que te vinculás con los demás.',
        'A veces, la presión por ser siempre fuertes, proveedores, autosuficientes o por reprimir lo que sentimos se vuelve una carga invisible que genera un gran malestar.',
        'Quiero explorar eso con vos.',
        '¿Te animás?'
    ],
    notes:[
        '<strong class="font-bold text-clinical-slate">Es 100% anónimo:</strong> No registramos nombres, correos ni datos que puedan identificarte.',
        '<strong class="font-bold text-clinical-slate">No hay respuestas correctas ni incorrectas:</strong> Nos interesa tu experiencia real, sin filtros.',
        '<strong class="font-bold text-clinical-slate">Tu honestidad es valiosa:</strong> Responder con la mayor sinceridad posible me ayuda a construir herramientas terapéuticas más empáticas y efectivas para los varones.'
    ]
},
{
    type:'question',
    id:'q_regulacion_1',
    block:'Regulación emocional',
    question:'Cuando pasás por un momento difícil, de mucha angustia, estrés o tristeza, ¿qué solés hacer?',
    multiple:true,
    options:[
        'Intento resolverlo solo y no decir nada para no preocupar a nadie',
        'Trato de distraerme con el trabajo, gimnasio o actividades para no pensar',
        'Me guardo lo que siento hasta que se me pasa o "exploto"',
        'Busco a alguien de confianza para hablar de lo que me pasa',
        'Consumo alcohol, tabaco u otras sustancias para bajar la intensidad',
        'Otra opción'
    ]
},
{
    type:'question',
    id:'q_regulacion_2',
    block:'Regulación emocional',
    question:'¿Con qué frecuencia sentís que tenés que mostrarte "fuerte" o en control, incluso cuando por dentro estás desbordado o asustado?',
    multiple:false,
    options:[
        'Siempre o casi siempre',
        'Muchas veces',
        'A veces',
        'Raras veces o nunca'
    ]
},
{
    type:'question',
    id:'q_regulacion_3',
    block:'Regulación emocional',
    question:'¿Qué tan fácil o difícil te resulta <strong class="font-bold">identificar exactamente qué emoción estás sintiendo</strong> (ej. distinguir si es tristeza, miedo o frustración, y no solo "bronca")?',
    multiple:false,
    options:[
        'Muy fácil',
        'Fácil',
        'Difícil',
        'Muy difícil'
    ]
},
{
    type:'transition',
    text:'Aislarse emocionalmente es una respuesta común, pero <strong class="font-bold">contar con espacios seguros hace una gran diferencia.</strong>'
},
{
    type:'question',
    id:'q_vinculos_1',
    block:'Red de Apoyo y Vínculos',
    question:'Si hoy tuvieras un problema personal grave (económico, familiar o de salud mental), ¿a quién acudirías en primer lugar para buscar apoyo?',
    multiple:false,
    options:[
        'A mi pareja (si la tenés)',
        'A un amigo varón',
        'A una amiga mujer',
        'A un familiar (madre, padre, hermanos, etc.)',
        'A un/a profesional de la salud mental',
        'A nadie, me lo guardaría para mí'
    ]
},
{
    type:'question',
    id:'q_vinculos_2',
    block:'Red de Apoyo y Vínculos',
    question:'Pensando en tus amigos varones más cercanos, ¿con qué frecuencia hablan de <strong class="font-bold">temas profundos, miedos, inseguridades o crisis personales</strong>?',
    multiple:false,
    options:[
        'Seguido (es un espacio donde podemos mostrarnos vulnerables)',
        'A veces (hablamos de cosas serias, pero sin profundizar demasiado)',
        'Casi nunca (los encuentros son más para distraernos)',
        'Nunca'
    ]
},
{
    type:'question',
    id:'q_vinculos_3',
    block:'Red de Apoyo y Vínculos',
    question:'¿Alguna vez evitaste contarle un problema a un amigo varón por <strong class="font-bold">miedo a ser juzgado, parecer "débil" o incomodarlo</strong>?',
    multiple:false,
    options:[
        'Sí, me pasó muchas veces',
        'Sí, me pasó alguna vez',
        'No, nunca me pasó'
    ]
},
{
    type:'transition',
    text:'A veces, cargar con los mandatos ajenos nos aleja de <strong class="font-bold">la forma en la que realmente queremos vivir.</strong>'
},
{
    type:'question',
    id:'q_crianza_1',
    block:'Crianza y mandatos',
    question:'¿Qué mensajes sentís que más marcaron tu forma de vivir la masculinidad?',
    multiple:true,
    options:[
        'Los hombres no lloran',
        'Tenés que poder solo',
        'Mostrar emociones es debilidad',
        'El hombre tiene que sostener todo',
        'Otro'
    ]
},
{
    type:'question',
    id:'q_crianza_2',
    block:'Crianza y mandatos',
    question:'¿En qué área sentís más presión por sostener o rendir?',
    multiple:true,
    options:[
        'Trabajo',
        'Economía',
        'Familia',
        'Pareja',
        'Salud',
        'Expectativas personales'
    ]
},
{
    type:'transition',
    text:'Reflexionar sobre nuestra salud mental nos abre puertas a <strong class="font-bold">nuevas herramientas de bienestar.</strong>'
},
{
    type:'question',
    id:'q_terapia_1',
    block:'Espacio Terapéutico',
    question:'¿Alguna vez realizaste o estás realizando actualmente un proceso de terapia psicológica basada en evidencia?',
    multiple:false,
    options:[
        'Sí, estoy en terapia actualmente',
        'Sí, hice terapia en el pasado pero ahora no',
        'No, nunca hice pero me interesaría',
        'No, y tampoco considero que lo necesite'
    ]
},
{
    type:'question',
    id:'q_taller_1',
    block:'Espacios Grupales',
    question:'¿Qué tan viable te resultaría sumarte a un <strong class="font-bold">taller VIRTUAL y QUINCENAL</strong> junto a otros varones para trabajar regulación emocional y revisar creencias sobre el "ser varón"?',
    multiple:false,
    options:[
        'Muy viable / Me re interesaría',
        'Viable, pero dependería de los horarios o el costo',
        'Poco viable / Prefiero lo presencial',
        'Nada viable: No participaría'
    ]
},
{
    type:'question',
    id:'q_taller_2',
    block:'Espacios Grupales',
    question:'En caso de que participaras o te interesara conocer más sobre la propuesta, ¿qué días y horarios te resultarían más convenientes?',
    multiple:true,
    options:[
        'Días de semana por la tarde/noche (ej. 19 a 21 hs)',
        'Sábados por la mañana',
        'Sábados por la tarde',
        'Otro horario',
        'No participaría del espacio'
    ]
},
{
    type:'question',
    id:'q_taller_3',
    block:'Espacios Grupales',
    question:'¿Considerás que la presencia de un co-terapeuta varón en el espacio grupal aportaría a tu comodidad o proceso terapéutico?',
    multiple:false,
    options:[
        'Sí, me sentiría más cómodo',
        'Me es indiferente / Me da igual',
        'Prefiero que sea coordinado únicamente por una terapeuta mujer',
        'Prefiero que sea coordinado únicamente por un terapeuta varón'
    ]
},
{
    type:'outro'
}
];

let currentIndex = 0;
let responses = {};

let totalQuestions = experienceFlow.filter(step => step.type === 'question').length;

const appContainer = document.getElementById('app-container');
const progressContainer = document.getElementById('progress-container');
const progressBar = document.getElementById('progress-bar');

async function navigateTo(newIndex){
    if(newIndex < 0 || newIndex >= experienceFlow.length) return;

    const currentContent = document.getElementById('slide-content');
    if(currentContent){
        currentContent.classList.add('slide-exit');
        await new Promise(resolve => setTimeout(resolve,250));
    }

    currentIndex = newIndex;
    window.scrollTo({ top:0, behavior:'smooth' });

    renderCurrentStep();
    updateProgress();

    const newContent = document.getElementById('slide-content');
    newContent.classList.add('slide-enter');
    void newContent.offsetWidth;
    newContent.classList.remove('slide-enter');

    if(experienceFlow[currentIndex].type === 'outro'){
        sendDataToBackendSilently();
    }
}

function updateProgress(){
    const currentStep = experienceFlow[currentIndex];
    if(currentStep.type === 'intro' || currentStep.type === 'outro'){
        progressContainer.style.opacity = '0';
        return;
    }
    progressContainer.style.opacity = '1';

    let questionsSeen = 0;
    for(let i=0; i<=currentIndex; i++){
        if(experienceFlow[i].type === 'question'){
            questionsSeen++;
        }
    }
    const percentage = (questionsSeen / totalQuestions) * 100;
    progressBar.style.width = `${percentage}%`;
}

function buildIntro(data){
return `
<div id="slide-content" class="slide-container w-full max-w-4xl flex flex-col justify-center items-center text-center px-4 md:px-8">
    <h1 class="font-serif text-4xl md:text-5xl lg:text-6xl text-clinical-slate mb-6 md:mb-8 font-semibold tracking-tight">
        ${data.title}
    </h1>
    
    ${getSeparatorHtml()}

    <div class="flex flex-col space-y-5 md:space-y-6 text-clinical-taupe text-[15px] md:text-[17px] lg:text-[19px] font-serif leading-relaxed md:leading-loose max-w-3xl text-center my-6 md:my-8">
        ${data.content.map(p => `<p>${p}</p>`).join('')}
    </div>

    <div class="flex flex-col space-y-4 mb-14 text-[13.5px] md:text-[15px] text-clinical-taupe font-sans font-medium max-w-2xl mx-auto text-left w-full mt-4">
        <span class="block font-sans text-xs md:text-sm uppercase tracking-[0.2em] text-clinical-slate font-bold mb-3 text-center opacity-80">Información importante</span>
        ${data.notes.map(note => `<div class="flex items-start leading-relaxed md:leading-loose"><span class="mr-3 text-clinical-slate">•</span><span>${note}</span></div>`).join('')}
    </div>

    <button onclick="navigateTo(currentIndex + 1)" class="group text-clinical-slate hover:text-clinical-taupe transition-colors duration-300 font-sans tracking-[0.2em] uppercase text-xs md:text-sm font-bold">
        Comenzar recorrido
        <span class="block w-0 group-hover:w-full h-[1.5px] bg-clinical-slate transition-all duration-300 mt-2 mx-auto"></span>
    </button>
</div>
`;
}

function buildQuestion(data){
const savedState = responses[data.id] || { selected:[], detail:'' };
const hasSelection = savedState.selected.length > 0;
const btnVisibleClass = hasSelection ? 'visible' : '';
const selectionHint = data.multiple
    ? '<span class="block text-clinical-taupe text-[11px] md:text-xs font-sans mt-4 font-semibold tracking-normal">(Podés seleccionar varias opciones)</span>'
    : '';

const optionsHtml = data.options.map(opt => {
    const isSelected = savedState.selected.includes(opt);
    const selectedClass = isSelected ? 'selected' : '';
    return `
        <div onclick="selectOption('${data.id}','${opt}',${data.multiple})" class="option-card ${selectedClass} w-full py-3 px-4 md:py-3.5 md:px-5 rounded-xl cursor-pointer flex items-center justify-center text-center">
            <span class="font-sans text-[14px] md:text-[15px] transition-colors leading-tight">
                ${opt}
            </span>
        </div>
    `;
}).join('');

return `
<div id="slide-content" class="slide-container w-full flex flex-col md:flex-row gap-8 md:gap-12 lg:gap-16 max-w-5xl mx-auto items-start justify-center pt-2 md:pt-6">
    <div class="w-full md:w-[50%] lg:w-[55%] flex flex-col text-center md:text-left md:pr-4 lg:pr-8">
        <span class="block font-sans text-[10px] md:text-xs uppercase tracking-[0.2em] text-clinical-taupe font-bold mb-3 md:mb-4">
            ${data.block}
        </span>
        <h2 class="font-serif text-xl md:text-2xl lg:text-[28px] text-clinical-slate leading-snug md:leading-relaxed lg:leading-[1.4] font-semibold">
            ${data.question}
        </h2>
        ${selectionHint}
        <div class="hidden md:block w-12 h-[2px] bg-clinical-border/60 mt-8 rounded-full"></div>
    </div>
    <div class="w-full md:w-[50%] lg:w-[45%] flex flex-col gap-0">
        <div id="options-${data.id}" class="flex flex-col gap-2 md:gap-3 w-full mb-6">
            ${optionsHtml}
        </div>
        <div class="w-full mb-6">
            <textarea id="detail-${data.id}" class="intimate-textarea w-full pt-3 pb-2 text-[14px] md:text-[15px] font-sans" rows="2" placeholder="Si querés, podés profundizar acá..." oninput="autoResizeTextarea(this); updateDetail('${data.id}', this.value)">${savedState.detail}</textarea>
        </div>
        <div class="flex items-center justify-between w-full pt-2">
            <button onclick="navigateTo(currentIndex - 1)" class="text-clinical-taupe hover:text-clinical-slate text-[11px] md:text-xs uppercase tracking-[0.15em] transition-colors font-bold">
                Volver
            </button>
            <button id="btn-continue-${data.id}" onclick="navigateTo(currentIndex + 1)" class="btn-fade ${btnVisibleClass} text-clinical-slate hover:text-clinical-taupe text-[11px] md:text-xs uppercase tracking-[0.15em] transition-colors font-bold">
                Siguiente
            </button>
        </div>
    </div>
</div>
`;
}

function buildTransition(data){
return `
<div id="slide-content" class="slide-container w-full max-w-4xl flex flex-col justify-center items-center text-center px-4 md:px-8">
    ${getSeparatorHtml()}
    <div class="my-6 md:my-10 w-full">
        <p class="font-serif text-xl md:text-[26px] lg:text-[30px] text-clinical-slate font-medium leading-relaxed md:leading-[1.5] max-w-3xl mx-auto">
            ${data.text}
        </p>
    </div>
    ${getSeparatorHtml()}
    <button onclick="navigateTo(currentIndex + 1)" class="mt-8 text-clinical-taupe hover:text-clinical-slate text-xs uppercase tracking-[0.2em] transition-colors duration-300 font-bold">
        Continuar
    </button>
</div>
`;
}

function buildOutro(){
return `
<div id="slide-content" class="slide-container w-full max-w-3xl flex flex-col justify-center items-center text-center px-4">
    <h2 class="font-serif text-3xl md:text-4xl lg:text-5xl text-clinical-slate mb-6 md:mb-8 font-semibold mt-4">
        ¡Muchas gracias por tu tiempo y tus respuestas!
    </h2>
    <p class="font-serif italic text-lg md:text-xl text-clinical-taupe mb-12 md:mb-16 max-w-2xl font-medium leading-relaxed md:leading-loose">
        Valoro enormemente tu honestidad y tu disposición. Cada comentario ayuda a construir un espacio seguro, cuidado y adaptado a tus necesidades para acercarnos a una vida más plena.
    </p>
    <div class="flex flex-col items-center">
        <button onclick="resetExperience()" class="group text-clinical-slate hover:text-clinical-taupe transition-colors duration-300 font-sans tracking-[0.15em] uppercase text-xs md:text-sm font-bold">
            Volver al inicio
            <span class="block w-0 group-hover:w-full h-[1.5px] bg-clinical-slate transition-all duration-300 mt-2 mx-auto"></span>
        </button>
    </div>
</div>
`;
}

function renderCurrentStep(){
    const step = experienceFlow[currentIndex];
    let html = '';

    switch(step.type){
        case 'intro': html = buildIntro(step); break;
        case 'question': html = buildQuestion(step); break;
        case 'transition': html = buildTransition(step); break;
        case 'outro': html = buildOutro(); break;
    }

    appContainer.innerHTML = html;
    const textareas = appContainer.querySelectorAll('textarea');
    textareas.forEach(ta => autoResizeTextarea(ta));
}

window.selectOption = function(questionId,optionText,isMultiple){
    if(!responses[questionId]){
        responses[questionId] = { selected:[], detail:'' };
    }
    let currentSelection = responses[questionId].selected;

    if(isMultiple){
        if(currentSelection.includes(optionText)){
            currentSelection = currentSelection.filter(item => item !== optionText);
        } else {
            currentSelection.push(optionText);
        }
    } else {
        currentSelection = [optionText];
    }
    responses[questionId].selected = currentSelection;
    renderCurrentStep();
};

window.updateDetail = function(questionId,text){
    if(!responses[questionId]){
        responses[questionId] = { selected:[], detail:'' };
    }
    responses[questionId].detail = text;
};

window.autoResizeTextarea = function(element){
    element.style.height = 'auto';
    element.style.height = (element.scrollHeight) + 'px';
};

window.sendDataToBackendSilently = async function(){
    const exportData = {
        fecha:new Date().toISOString(),
        respuestas:[]
    };

    experienceFlow.forEach(step => {
        if(step.type === 'question' && responses[step.id]){
            exportData.respuestas.push({
                id_pregunta:step.id,
                bloque:step.block,
                pregunta:step.question,
                seleccion:responses[step.id].selected.join(' | '),
                notas:responses[step.id].detail || ""
            });
        }
    });

    try{
        await fetch(
            "https://script.google.com/macros/s/AKfycbyHTT18jhFBd0XheNrwXpnsryEJhFeLEhXHU7JQfdfRp2A0LyWOx0BQEpapRwj7PyRW/exec",
            {
                method:"POST",
                redirect:"follow",
                headers:{
                    "Content-Type":"text/plain;charset=utf-8"
                },
                body:JSON.stringify(exportData)
            }
        );
        console.log("Datos enviados correctamente");
    } catch(error){
        console.error("Error enviando datos:", error);
    }
};

window.resetExperience = async function(){
    responses = {};
    await navigateTo(0);
};

document.addEventListener('DOMContentLoaded', () => {
    renderCurrentStep();
});

</script>

</body>
</html>
